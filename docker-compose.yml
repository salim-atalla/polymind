services:
  symfony-app:
    build: ./symfony-app
    volumes:
      - ./symfony-app:/var/www/html
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./symfony-app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - symfony-app

  fastapi-router:
    build: ./fastapi-router
    ports:
      - "8000:8000"
    env_file:
      - ./fastapi-router/.env
    volumes:
      - ./fastapi-router:/app

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: polymind
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

volumes:
  db_data:
