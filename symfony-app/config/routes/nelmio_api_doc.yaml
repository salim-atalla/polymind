app.swagger_ui:
    path: /api/doc/{area}
    methods: GET
    defaults:
        _controller: nelmio_api_doc.controller.redocly
        area: default

app.swagger_json:
    path: /api/doc.json/{area}
    methods: GET
    defaults:
        _controller: nelmio_api_doc.controller.swagger_json
        area: default
