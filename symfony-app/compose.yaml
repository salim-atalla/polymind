services:
  # ── Symfony ──────────────────────────────
  symfony-app:
    build: ./symfony-app
    volumes:
      - ./symfony-app:/var/www/html
    depends_on:
      - db
    environment:
      - APP_ENV=dev

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./symfony-app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - symfony-app

  # ── FastAPI ───────────────────────────────
  fastapi-router:
    build: ./fastapi-router
    ports:
      - "8000:8000"
    env_file:
      - ./fastapi-router/.env
    volumes:
      - ./fastapi-router:/app

  # ── Database ──────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: polymind
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # ── Frontend ──────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - symfony-app

volumes:
  db_data:
